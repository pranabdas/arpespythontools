name: Python tests
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/python-tests.yml
      - poetry.lock
      - pyproject.toml
      - src/arpespythontools/**
      - tests/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/python-tests.yml
      - poetry.lock
      - pyproject.toml
      - src/arpespythontools/**
      - tests/**

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install poetry
        run: pip install --upgrade poetry

      - name: Install dependencies
        run: poetry install

      - name: Run unittest
        run: poetry run python -m unittest discover tests
